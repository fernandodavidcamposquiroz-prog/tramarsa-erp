<div class="page">
  <div class="page-header">
    <h2><i class="bi bi-boxes"></i> Inventario de Servicios Maritimos</h2>
    <span class="summary-stat">Total: <strong>{{ filteredServicios.length }}</strong> servicios</span>
  </div>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <ng-container *ngIf="!loading">
    <!-- Category filter pills -->
    <div class="filter-pills">
      <button
        class="pill"
        [class.active]="selectedCategoria === ''"
        (click)="filterByCategoria('')"
      >Todos</button>
      <button
        *ngFor="let cat of categorias"
        class="pill"
        [class.active]="selectedCategoria === cat"
        (click)="filterByCategoria(cat)"
      >{{ cat }}</button>
    </div>

    <!-- Service cards grid -->
    <div class="cards-grid">
      <div class="service-card" *ngFor="let s of filteredServicios">
        <div class="card-top">
          <span class="cat-badge">{{ s.categoria }}</span>
          <span class="service-code">{{ s.codigo }}</span>
        </div>
        <h4 class="service-name">{{ s.nombre }}</h4>
        <p class="service-desc">{{ s.descripcion }}</p>
        <div class="card-footer">
          <span class="price">S/ {{ s.precio_unitario | number:'1.2-2' }}</span>
          <span class="unit">por {{ s.unidad }}</span>
        </div>
      </div>
      <div *ngIf="filteredServicios.length === 0" class="empty">
        No hay servicios en esta categoría
      </div>
    </div>
  </ng-container>
</div>
