<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <i class="bi bi-tsunami"></i>
      </div>
      <h1>TRAMARSA ERP</h1>
      <p>Sistema de Gestión Empresarial</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email"><i class="bi bi-envelope"></i> Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="usuario@tramarsa.pe"
          class="form-input"
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <span class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Ingrese un correo válido
        </span>
      </div>

      <div class="form-group">
        <label for="password"><i class="bi bi-lock"></i> Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Contrasena"
          class="form-input"
          [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <span class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña debe tener al menos 6 caracteres
        </span>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        <i class="bi bi-exclamation-triangle"></i> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || loginForm.invalid">
        <i class="bi bi-box-arrow-in-right" *ngIf="!loading"></i>
        <span *ngIf="!loading"> Iniciar Sesión</span>
        <span *ngIf="loading"><i class="bi bi-hourglass-split"></i> Cargando...</span>
      </button>
    </form>

    <div class="demo-hint">
      <strong>Demo:</strong> admin&#64;tramarsa.pe / admin123
    </div>
  </div>
</div>
